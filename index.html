function getNudge(checked,startDate,pace){
  if(!startDate)return{msg:"Set your start date in Setup to activate weekly nudges.",type:"info"};
  const p=PACES.find(x=>x.id===pace)||PACES[1];
  const now=new Date(),start=new Date(startDate);
  const daysSince=Math.floor((now-start)/86400000);
  const weekIdx=Math.min(Math.floor(daysSince/7),23);
  const dow=daysSince%7;
  const m=PLAN[Math.floor(weekIdx/4)],w=m?.weeks[weekIdx%4];
  const wDone=w?.tasks.filter((_,ti)=>checked[`${weekIdx}-${ti}`]).length||0;
  const wTotal=w?.tasks.length||0;
  const total=PLAN.flatMap(m=>m.weeks.flatMap(w=>w.tasks)).length;
  const done=Object.values(checked).filter(Boolean).length;
  const pct=Math.round((done/total)*100);
  if(dow>=3&&wDone===0)return{msg:`Midweek check-in: no tasks started yet this week. At ${p.label} you need ~${Math.ceil(wTotal/2)} tasks done by now to stay on track.`,type:"warn"};
  if(dow>=5&&wDone<wTotal)return{msg:`Weekend: ${wTotal-wDone} task(s) remaining this week. A ${Math.round((wTotal-wDone)*20)} min session keeps you on pace.`,type:"warn"};
  if(wDone===wTotal&&wTotal>0)return{msg:`Week complete! You're ${pct}% through the full plan at ${p.label}. Great consistency.`,type:"success"};
  if(done===0)return{msg:`Welcome! At ${p.label} you'll complete this plan in ~${p.months} months. Open Month 1 and start your first task today.`,type:"info"};
  return{msg:`${pct}% complete at ${p.label}. Estimated finish: ~${p.months} months from your start date. Keep showing up.`,type:"info"};
}

  const[activeMonth,setActiveMonth]=useState(0);
  const[expandedWeeks,setExpandedWeeks]=useState({"0-0":true});
  const[filter,setFilter]=useState("all");

  useEffect(()=>{
    try{
      const c=localStorage.getItem(STORAGE_KEY),d=localStorage.getItem(START_KEY),p=localStorage.getItem(PACE_KEY);
      if(c)setChecked(JSON.parse(c));
      if(d)setStartDate(d);
      if(p)setPace(p);
    }catch{}
  },[]);

  const save=(nc,nd,np)=>{
    try{
      if(nc!==undefined)localStorage.setItem(STORAGE_KEY,JSON.stringify(nc));
      if(nd!==undefined)localStorage.setItem(START_KEY,nd);
      if(np!==undefined)localStorage.setItem(PACE_KEY,np);
    }catch{}
  };

  const handleOnboard=(p)=>{setPace(p);save(undefined,undefined,p);};
  const toggleTask=(key,e)=>{e.stopPropagation();const next={...checked,[key]:!checked[key]};setChecked(next);save(next);};
  const toggleWeek=key=>setExpandedWeeks(p=>({...p,[key]:!p[key]}));

  if(!pace)return<Onboarding onDone={handleOnboard}/>;

  const paceObj=PACES.find(x=>x.id===pace)||PACES[1];
  const allTasks=PLAN.flatMap(m=>m.weeks.flatMap(w=>w.tasks));
  const total=allTasks.length;
  const aiTotal=allTasks.filter(t=>t.ai).length;
  const done=Object.values(checked).filter(Boolean).length;
  const pct=Math.round((done/total)*100);

  const mProg=PLAN.map((m,mi)=>{
    const keys=m.weeks.flatMap((w,wi)=>w.tasks.map((_,ti)=>`${mi*4+wi}-${ti}`));
    const d=keys.filter(k=>checked[k]).length;
    return{done:d,total:keys.length,pct:Math.round((d/keys.length)*100)};
  });

  const nudge=getNudge(checked,startDate,pace);

  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px"}}>
      <div style={{marginBottom:16}}>
        <h1 style={{fontSize:22,fontWeight:500,marginBottom:4}}>DevSecOps learning tracker</h1>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:13,color:"#6b7280"}}>{total} tasks · {aiTotal} AI tasks</span>
          <span style={{fontSize:11,background:"#eef2ff",color:"#4f46e5",borderRadius:6,padding:"2px 8px",fontWeight:500}}>📅 {paceObj.label} · ~{paceObj.months} months</span>
          <button onClick={()=>{save(undefined,undefined,"");setPace(null);}} style={{fontSize:11,color:"#9ca3af",background:"transparent",border:"none",cursor:"pointer",textDecoration:"underline",fontFamily:"inherit"}}>change pace</button>
        </div>
      </div>

      {/* Two-phase roadmap banner */}
      <div className="phase-bar" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,overflow:"hidden",marginBottom:16}}>
        <div style={{padding:"10px 14px 8px",borderBottom:"0.5px solid #f3f4f6"}}>
          <span style={{fontSize:12,fontWeight:500,color:"#374151"}}>Your 2-phase career roadmap</span>
        </div>
        <div style={{display:"flex"}}>
          <div style={{flex:1,background:"#4f46e5",padding:"12px 14px"}}>
            <div style={{fontSize:10,color:"#c7d2fe",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>Phase 1 · Months 1–{paceObj.months}</div>
            <div style={{fontSize:14,fontWeight:500,color:"#fff",marginBottom:2}}>DevSecOps role</div>
            <div style={{fontSize:11,color:"#c7d2fe",lineHeight:1.4}}>Security testing · Pen testing · Secure CI/CD · CompTIA Security+ · Incident response · Compliance</div>
            <div style={{marginTop:8,fontSize:11,background:"rgba(255,255,255,0.15)",borderRadius:6,padding:"4px 8px",color:"#e0e7ff",display:"inline-block"}}>👈 You are here — this tracker</div>
          </div>
          <div style={{flex:1,background:"#0c4a6e",padding:"12px 14px"}}>
            <div style={{fontSize:10,color:"#7dd3fc",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>Phase 2 · Months {paceObj.months+1}–{paceObj.months*2}</div>
            <div style={{fontSize:14,fontWeight:500,color:"#fff",marginBottom:2}}>DevOps role</div>
            <div style={{fontSize:11,color:"#7dd3fc",lineHeight:1.4}}>Kubernetes · Terraform · Python scripting · Advanced AWS · Monitoring · GitOps</div>
            <div style={{marginTop:8,fontSize:11,background:"rgba(255,255,255,0.1)",borderRadius:6,padding:"4px 8px",color:"#bae6fd",display:"inline-block"}}>🔒 Unlocks after Phase 1</div>
          </div>
        </div>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:20,borderBottom:"0.5px solid #e5e7eb",paddingBottom:12}}>
        {["dashboard","plan","phase2","setup"].map(v=>(
          <button key={v} className={`nav-btn${view===v?" active":""}`} onClick={()=>setView(v)}
            style={{background:view===v?"#f3f4f6":"transparent",border:"0.5px solid "+(view===v?"#d1d5db":"transparent"),borderRadius:8,padding:"6px 14px",fontSize:13,cursor:"pointer",fontWeight:view===v?500:400,fontFamily:"inherit",color:view===v?"#111827":"#6b7280"}}>
            {v==="dashboard"?"Dashboard":v==="plan"?"Full plan":v==="phase2"?"Phase 2 preview":"Setup"}
          </button>
        ))}
      </div>

      {view==="dashboard"&&(
        <>
          <div style={{...nudgeStyle[nudge.type],borderRadius:10,padding:"10px 14px",fontSize:13,marginBottom:16}}>{nudge.msg}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
            {[{label:"Overall progress",val:pct+"%",sub:`${done}/${total} tasks`},{label:"Tasks completed",val:done,sub:"across all months"},{label:"Est. completion",val:`~${paceObj.months}mo`,sub:`at ${paceObj.label}`}].map((c,i)=>(
              <div key={i} className="metric" style={{background:"#f9fafb",border:"0.5px solid #e5e7eb",borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>{c.label}</div>
                <div style={{fontSize:22,fontWeight:500}}>{c.val}</div>
                <div style={{fontSize:11,color:"#9ca3af"}}>{c.sub}</div>
              </div>
            ))}
          </div>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px"}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:14}}>Monthly progress</div>
            {PLAN.map((m,i)=>(
              <div key={i} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                  <span style={{fontWeight:500}}>Month {m.month} — {m.title}</span>
                  <span style={{color:"#6b7280"}}>{mProg[i].done}/{mProg[i].total}</span>
                </div>
                <div style={{height:5,borderRadius:99,background:"#e5e7eb",overflow:"hidden"}}>
                  <div style={{height:"100%",width:mProg[i].pct+"%",background:phaseColors[m.phase],borderRadius:99,transition:"width 0.4s"}}/>
                </div>
                <div style={{fontSize:11,color:"#9ca3af",marginTop:3}}>{m.phase} · {mProg[i].pct}% complete</div>
              </div>
            ))}
          </div>
        </>
      )}

      {view==="plan"&&(
        <>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
            {PLAN.map((m,i)=>(
              <button key={i} onClick={()=>setActiveMonth(i)}
                style={{background:activeMonth===i?phaseColors[m.phase]+"18":"transparent",border:"0.5px solid "+(activeMonth===i?phaseColors[m.phase]:"#e5e7eb"),borderRadius:8,padding:"5px 14px",fontSize:13,cursor:"pointer",color:activeMonth===i?phaseColors[m.phase]:"#6b7280",fontWeight:activeMonth===i?500:400,fontFamily:"inherit"}}>
                M{m.month}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            {["all","regular","ai","new"].map(f=>(
              <button key={f} onClick={()=>setFilter(f)}
                style={{background:filter===f?(f==="ai"?"#eef2ff":f==="new"?"#f0fdf4":"#f3f4f6"):"transparent",border:"0.5px solid "+(filter===f?(f==="ai"?"#6366f1":f==="new"?"#16a34a":"#d1d5db"):"#e5e7eb"),borderRadius:6,padding:"4px 12px",fontSize:12,cursor:"pointer",color:filter===f?(f==="ai"?"#4f46e5":f==="new"?"#15803d":"#111827"):"#6b7280",fontFamily:"inherit"}}>
                {f==="all"?"All tasks":f==="ai"?"🤖 AI only":f==="new"?"⭐ New only":"Regular only"}
              </button>
            ))}
          </div>
          {(()=>{
            const m=PLAN[activeMonth],mp=mProg[activeMonth];
            return(
              <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                      <span style={{fontSize:11,fontWeight:500,color:phaseColors[m.phase],textTransform:"uppercase",letterSpacing:0.5}}>{m.phase} · Month {m.month}</span>
                      {m.weeks.some(w=>w.isNew)&&<span style={{fontSize:10,fontWeight:500,background:"#f0fdf4",color:"#15803d",borderRadius:4,padding:"1px 6px"}}>has new content</span>}
                    </div>
                    <div style={{fontSize:16,fontWeight:500}}>{m.title}</div>
                  </div>
                  <span style={{fontSize:13,color:"#6b7280"}}>{mp.done}/{mp.total}</span>
                </div>
                <div style={{height:5,borderRadius:99,background:"#e5e7eb",overflow:"hidden",marginBottom:16}}>
                  <div style={{height:"100%",width:mp.pct+"%",background:phaseColors[m.phase],borderRadius:99,transition:"width 0.4s"}}/>
                </div>
                {m.weeks.map((w,wi)=>{
                  const wKey=`${activeMonth}-${wi}`;
                  const gIdx=activeMonth*4+wi;
                  const filteredTasks=w.tasks.filter(t=>filter==="all"||(filter==="ai"&&t.ai)||(filter==="regular"&&!t.ai)||(filter==="new"&&t.isNew));
                  if(filteredTasks.length===0)return null;
                  const wDone=w.tasks.filter((_,ti)=>checked[`${gIdx}-${ti}`]).length;
                  const open=!!expandedWeeks[wKey];
                  return(
                    <div key={wi}>
                      <div className="week-sep" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",cursor:"pointer",borderTop:"0.5px solid #f3f4f6"}} onClick={()=>toggleWeek(wKey)}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:11,color:"#9ca3af"}}>Week {w.week} · </span>
                          <span style={{fontSize:14,fontWeight:500}}>{w.title}</span>
                          {w.isNew&&<span style={{fontSize:10,fontWeight:500,background:"#f0fdf4",color:"#15803d",borderRadius:4,padding:"1px 6px"}}>new</span>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:12,color:wDone===w.tasks.length?"#16a34a":"#9ca3af"}}>{wDone}/{w.tasks.length}</span>
                          <span style={{fontSize:11,color:"#9ca3af"}}>{open?"▲":"▼"}</span>
                        </div>
                      </div>
                      {open&&filteredTasks.map((task)=>{
                        const ti=w.tasks.indexOf(task);
                        const tKey=`${gIdx}-${ti}`;
                        const isDone=!!checked[tKey];
                        return(
                          <div key={ti} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"9px 0 9px 4px",borderTop:"0.5px solid #f9fafb",background:task.ai?"#fafafe":task.isNew?"#fafff7":"transparent"}}>
                            <div onClick={e=>toggleTask(tKey,e)} style={{width:18,height:18,borderRadius:5,border:isDone?"none":"1.5px solid #d1d5db",background:isDone?"#22c55e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2,cursor:"pointer"}}>
                              {isDone&&<span style={{color:"white",fontSize:11,fontWeight:600}}>✓</span>}
                            </div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:task.ai||task.isNew?4:0}}>
                                {task.ai&&<span className="ai-badge" style={{fontSize:10,fontWeight:500,background:"#eef2ff",color:"#4338ca",borderRadius:4,padding:"1px 6px"}}>AI task</span>}
                                {task.isNew&&<span style={{fontSize:10,fontWeight:500,background:"#f0fdf4",color:"#15803d",borderRadius:4,padding:"1px 6px"}}>new</span>}
                              </div>
                              {task.url?(
                                <a href={task.url} target="_blank" rel="noopener noreferrer"
                                  style={{fontSize:13,lineHeight:1.5,color:task.ai?"#6366f1":"#4f46e5",textDecoration:isDone?"line-through":"underline",opacity:isDone?0.5:1,display:"block",wordBreak:"break-word"}}>
                                  {task.label} ↗
                                </a>
                              ):(
                                <span style={{fontSize:13,lineHeight:1.5,color:"#374151",textDecoration:isDone?"line-through":"none",opacity:isDone?0.5:1,display:"block"}}>{task.label}</span>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </>
      )}

      {view==="phase2"&&(
        <>
          <div style={{background:"#0c4a6e",borderRadius:12,padding:"16px 18px",marginBottom:16,color:"#fff"}}>
            <div style={{fontSize:11,color:"#7dd3fc",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Phase 2 · Months {paceObj.months+1}–{paceObj.months*2} · After DevSecOps role</div>
            <div style={{fontSize:18,fontWeight:500,marginBottom:6}}>DevOps Engineer roadmap</div>
            <div style={{fontSize:13,color:"#bae6fd",lineHeight:1.6}}>Once you've transitioned into a DevSecOps or SecOps role and have 3–6 months of experience, Phase 2 will build the deeper DevOps skills that make you a complete DevSecOps + DevOps engineer. This is optional — many DevSecOps engineers never need to go this deep — but it opens up senior and lead roles.</div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {PHASE2_TOPICS.map((t,i)=>(
              <div key={i} className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"14px"}}>
                <div style={{fontSize:20,marginBottom:6}}>{t.icon}</div>
                <div style={{fontSize:14,fontWeight:500,marginBottom:3}}>{t.title}</div>
                <div style={{fontSize:12,color:"#6b7280"}}>{t.desc}</div>
              </div>
            ))}
          </div>

          <div style={{background:"#f0fdf4",border:"0.5px solid #bbf7d0",borderRadius:10,padding:"12px 14px",fontSize:13,color:"#15803d",marginBottom:10}}>
            <strong>When to start Phase 2:</strong> After you've been in a DevSecOps role for at least 3 months and feel confident with security pipelines, pen testing basics, and cloud security. Don't rush — real-world experience in Phase 1 makes Phase 2 much easier to absorb.
          </div>
          <div style={{...nudgeStyle.info,borderRadius:10,padding:"12px 14px",fontSize:13}}>
            <strong>Note:</strong> A full Phase 2 plan (Months 7–{paceObj.months*2}) can be generated here when you're ready. It will be tailored to what you've already learned in Phase 1.
          </div>
        </>
      )}

      {view==="setup"&&(
        <>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:8}}>Your pace</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              {PACES.map(p=>(
                <button key={p.id} className={`pace-btn${pace===p.id?" selected":""}`} onClick={()=>{setPace(p.id);save(undefined,undefined,p.id);}}
                  style={{background:pace===p.id?"#4f46e5":"transparent",border:"0.5px solid "+(pace===p.id?"#4f46e5":"#e5e7eb"),borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                  <div style={{fontSize:13,fontWeight:500,color:pace===p.id?"#fff":"#111827",marginBottom:2}}>{p.label}</div>
                  <div style={{fontSize:11,color:pace===p.id?"#c7d2fe":"#6b7280"}}>{p.desc}</div>
                </button>
              ))}
            </div>
          </div>

          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:8}}>Start date</div>
            <p style={{fontSize:13,color:"#6b7280",marginBottom:10}}>Set the date you began Month 1. This powers the weekly nudge messages on the dashboard.</p>
            <input type="date" value={startDate} onChange={e=>{setStartDate(e.target.value);save(undefined,e.target.value);}} style={{width:"100%",fontSize:14,padding:"8px 10px",borderRadius:8,border:"0.5px solid #d1d5db",fontFamily:"inherit"}}/>
            {startDate&&<p style={{fontSize:12,color:"#16a34a",marginTop:8}}>Start date saved. Nudges are active on the dashboard.</p>}
          </div>

          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:10}}>Google Calendar — weekly study block</div>
            {["Open Google Calendar and click your preferred study day/time",`Set title: 'DevSecOps Study Session'`,`Set duration: ${paceObj.hrs <= 2 ? "2 hours" : "3 hours"} (matching your ${paceObj.label} pace)`,"Click 'More options' → Repeat: Every week","Add notification: 30 minutes before","Paste this app's URL in the description for one-click access","Save"].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"#eef2ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,color:"#4f46e5",flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:13,lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>

          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:10}}>Gmail — weekly self-reminder</div>
            {["Open Gmail and compose a new email to yourself","Subject: 'DevSecOps — weekly check-in'","Body: What did I complete? What's next? Am I on track?","Click the arrow next to Send → 'Schedule send'","Pick next Monday morning (e.g. 8am)","Each week, schedule the next one — takes 2 minutes","This forces a weekly review habit"].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"#f0fdf4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,color:"#16a34a",flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:13,lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
