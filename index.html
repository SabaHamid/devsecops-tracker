// ── Build dynamic schedule from pace ─────────────────────────
function buildSchedule(pace){
  const p=PACES.find(x=>x.id===pace)||PACES[1];
  const tpw=p.tasksPerWeek;
  const weeks=[];
  let i=0;
  let weekNum=1;
  while(i<ALL_TASKS.length){
    const chunk=ALL_TASKS.slice(i,i+tpw);
    // label week with milestone(s) covered
    const milestones=[...new Set(chunk.map(t=>t.milestone))];
    weeks.push({weekNum,tasks:chunk,milestones});
    i+=tpw;
    weekNum++;
  }
  return weeks;
}

function Onboarding({onDone}){
  const[pace,setPace]=useState("steady");
  const p=PACES.find(x=>x.id===pace);
  const totalWeeks=Math.ceil(ALL_TASKS.length/p.tasksPerWeek);
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:16,padding:"32px 28px",maxWidth:520,width:"100%"}}>
        <div style={{fontSize:28,marginBottom:8}}>👋</div>
        <h1 style={{fontSize:20,fontWeight:500,marginBottom:6}}>Welcome to your DevSecOps tracker</h1>
        <p style={{fontSize:14,color:"#6b7280",marginBottom:20,lineHeight:1.6}}>Set your weekly study pace. Your plan will be dynamically scheduled — faster pace means more tasks per week, compressing the timeline. You can change this anytime.</p>
        <PaceSelector value={pace} onChange={setPace}/>
        <div style={{background:"#f0f9ff",border:"0.5px solid #bae6fd",borderRadius:8,padding:"10px 14px",margin:"16px 0",fontSize:13,color:"#0c4a6e"}}>
          At <strong>{p.label}</strong>: <strong>{p.tasksPerWeek} tasks/week</strong> → complete all {ALL_TASKS.length} tasks in ~<strong>{totalWeeks} weeks</strong>
        </div>
        <div style={{background:"#f8fafc",border:"0.5px solid #e5e7eb",borderRadius:10,padding:"14px 16px",marginBottom:24}}>
          <div style={{fontSize:12,fontWeight:500,color:"#374151",marginBottom:10}}>Your 2-phase career journey</div>
          <div style={{display:"flex"}}>
            <div style={{flex:1,background:"#4f46e5",borderRadius:"8px 0 0 8px",padding:"10px 12px"}}>
              <div style={{fontSize:10,color:"#c7d2fe",marginBottom:2}}>Phase 1 · This tracker</div>
              <div style={{fontSize:13,fontWeight:500,color:"#fff"}}>DevSecOps role</div>
              <div style={{fontSize:11,color:"#c7d2fe",marginTop:2}}>Security · Pipelines · Pen testing · Cert</div>
            </div>
            <div style={{flex:1,background:"#0c4a6e",borderRadius:"0 8px 8px 0",padding:"10px 12px"}}>
              <div style={{fontSize:10,color:"#bae6fd",marginBottom:2}}>Phase 2 · After Phase 1</div>
              <div style={{fontSize:13,fontWeight:500,color:"#fff"}}>DevOps role</div>
              <div style={{fontSize:11,color:"#bae6fd",marginTop:2}}>K8s · Terraform · IaC · Advanced cloud</div>
            </div>
          </div>
        </div>
        <button onClick={()=>onDone(pace)} style={{width:"100%",background:"#4f46e5",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:15,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>
          Build my plan →
        </button>
      </div>
    </div>
  );
}

function App(){
  const[checked,setChecked]=useState({});
  const[startDate,setStartDate]=useState("");
  const[pace,setPace]=useState(null);
  const[view,setView]=useState("dashboard");
  const[activeWeek,setActiveWeek]=useState(0);
  const[filter,setFilter]=useState("all");
  const[expandedWeeks,setExpandedWeeks]=useState({0:true});

  useEffect(()=>{
    try{
      const c=localStorage.getItem(STORAGE_KEY),d=localStorage.getItem(START_KEY),p=localStorage.getItem(PACE_KEY);
      if(c)setChecked(JSON.parse(c));
      if(d)setStartDate(d);
      if(p)setPace(p);
    }catch{}
  },[]);

  const saveAll=(nc,nd,np)=>{
    try{
      if(nc!==undefined)localStorage.setItem(STORAGE_KEY,JSON.stringify(nc));
      if(nd!==undefined)localStorage.setItem(START_KEY,nd);
      if(np!==undefined)localStorage.setItem(PACE_KEY,np);
    }catch{}
  };

  const handleOnboard=p=>{setPace(p);saveAll(undefined,undefined,p);};
  const handlePaceChange=p=>{setPace(p);saveAll(undefined,undefined,p);};
  const toggleTask=id=>{const next={...checked,[id]:!checked[id]};setChecked(next);saveAll(next);};
  const toggleWeek=i=>setExpandedWeeks(p=>({...p,[i]:!p[i]}));

  if(!pace)return<Onboarding onDone={handleOnboard}/>;

  const paceObj=PACES.find(x=>x.id===pace)||PACES[1];
  const schedule=buildSchedule(pace);
  const total=ALL_TASKS.length;
  const done=ALL_TASKS.filter(t=>checked[t.id]).length;
  const pct=Math.round((done/total)*100);
  const totalWeeks=schedule.length;

  // current week based on start date
  let currentWeekIdx=0;
  if(startDate){
    const daysSince=Math.floor((new Date()-new Date(startDate))/86400000);
    currentWeekIdx=Math.min(Math.floor(daysSince/7),totalWeeks-1);
  }

  const currentWeek=schedule[currentWeekIdx];
  const cwDone=currentWeek?currentWeek.tasks.filter(t=>checked[t.id]).length:0;
  const cwTotal=currentWeek?currentWeek.tasks.length:0;
  const dayOfWeek=startDate?Math.floor((new Date()-new Date(startDate))/86400000)%7:0;

  // nudge
  let nudge={msg:`${pct}% complete at ${paceObj.label}. ${totalWeeks-currentWeekIdx} weeks remaining.`,type:"info"};
  if(!startDate)nudge={msg:"Set your start date in Setup to activate weekly nudges.",type:"info"};
  else if(dayOfWeek>=3&&cwDone===0)nudge={msg:`Midweek check-in: Week ${currentWeekIdx+1} tasks not started yet. At ${paceObj.label} you have ${cwTotal} tasks this week — aim for at least ${Math.ceil(cwTotal/2)} today.`,type:"warn"};
  else if(dayOfWeek>=5&&cwDone<cwTotal)nudge={msg:`Weekend: ${cwTotal-cwDone} task(s) left in Week ${currentWeekIdx+1}. A short session now keeps you on schedule.`,type:"warn"};
  else if(cwDone===cwTotal&&cwTotal>0)nudge={msg:`Week ${currentWeekIdx+1} complete! ${pct}% through the full plan. Next up: Week ${currentWeekIdx+2}.`,type:"success"};
  else if(done===0)nudge={msg:`At ${paceObj.label}: ${paceObj.tasksPerWeek} tasks/week → finish in ~${totalWeeks} weeks. Open Week 1 and start your first task!`,type:"info"};

  // milestone progress
  const msProg=MILESTONES.map(ms=>{
    const tasks=ALL_TASKS.filter(t=>t.milestone===ms.id);
    const d=tasks.filter(t=>checked[t.id]).length;
    return{...ms,done:d,total:tasks.length,pct:Math.round((d/tasks.length)*100)};
  });

  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px"}}>
      <div style={{marginBottom:16}}>
        <h1 style={{fontSize:22,fontWeight:500,marginBottom:4}}>DevSecOps learning tracker</h1>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:13,color:"#6b7280"}}>{total} tasks · {done} done</span>
          <span style={{fontSize:11,background:"#eef2ff",color:"#4f46e5",borderRadius:6,padding:"2px 8px",fontWeight:500}}>📅 {paceObj.label} · {paceObj.tasksPerWeek} tasks/wk · ~{totalWeeks} weeks total</span>
          <button onClick={()=>setPace(null)} style={{fontSize:11,color:"#9ca3af",background:"transparent",border:"none",cursor:"pointer",textDecoration:"underline",fontFamily:"inherit"}}>change pace</button>
        </div>
      </div>

      {/* Phase banner */}
      <div className="phase-banner" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,overflow:"hidden",marginBottom:16}}>
        <div style={{display:"flex"}}>
          <div style={{flex:1,background:"#4f46e5",padding:"10px 14px"}}>
            <div style={{fontSize:10,color:"#c7d2fe",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>Phase 1 · This tracker · ~{totalWeeks} weeks</div>
            <div style={{fontSize:13,fontWeight:500,color:"#fff"}}>DevSecOps role</div>
            <div style={{fontSize:11,color:"#c7d2fe",marginTop:2}}>Security · Pen testing · CI/CD · Security+ · IR · Compliance</div>
          </div>
          <div style={{flex:1,background:"#0c4a6e",padding:"10px 14px"}}>
            <div style={{fontSize:10,color:"#7dd3fc",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>Phase 2 · After Phase 1 · Unlocks later</div>
            <div style={{fontSize:13,fontWeight:500,color:"#fff"}}>DevOps role</div>
            <div style={{fontSize:11,color:"#7dd3fc",marginTop:2}}>Kubernetes · Terraform · Python · Advanced AWS · GitOps</div>
          </div>
        </div>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:20,borderBottom:"0.5px solid #e5e7eb",paddingBottom:12,flexWrap:"wrap"}}>
        {["dashboard","plan","milestones","phase2","setup"].map(v=>(
          <button key={v} className={`nav-btn${view===v?" active":""}`} onClick={()=>setView(v)}
            style={{background:view===v?"#f3f4f6":"transparent",border:"0.5px solid "+(view===v?"#d1d5db":"transparent"),borderRadius:8,padding:"6px 12px",fontSize:13,cursor:"pointer",fontWeight:view===v?500:400,fontFamily:"inherit",color:view===v?"#111827":"#6b7280"}}>
            {v==="dashboard"?"Dashboard":v==="plan"?"Weekly plan":v==="milestones"?"Milestones":v==="phase2"?"Phase 2":"Setup"}
          </button>
        ))}
      </div>

      {/* ── DASHBOARD ── */}
      {view==="dashboard"&&(
        <>
          <div style={{...nudgeSt[nudge.type],borderRadius:10,padding:"10px 14px",fontSize:13,marginBottom:16}}>{nudge.msg}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
            {[
              {label:"Overall progress",val:pct+"%",sub:`${done}/${total} tasks`},
              {label:"Current week",val:`Wk ${currentWeekIdx+1}/${totalWeeks}`,sub:`${cwDone}/${cwTotal} tasks done`},
              {label:"Weeks remaining",val:totalWeeks-currentWeekIdx,sub:`at ${paceObj.label}`},
            ].map((c,i)=>(
              <div key={i} className="metric" style={{background:"#f9fafb",border:"0.5px solid #e5e7eb",borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>{c.label}</div>
                <div style={{fontSize:22,fontWeight:500}}>{c.val}</div>
                <div style={{fontSize:11,color:"#9ca3af"}}>{c.sub}</div>
              </div>
            ))}
          </div>
          {/* Overall progress bar */}
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
              <span style={{fontWeight:500}}>Total plan progress</span>
              <span style={{color:"#6b7280"}}>{pct}%</span>
            </div>
            <div style={{height:8,borderRadius:99,background:"#e5e7eb",overflow:"hidden"}}>
              <div style={{height:"100%",width:pct+"%",background:"#4f46e5",borderRadius:99,transition:"width 0.4s"}}/>
            </div>
          </div>
          {/* This week's tasks preview */}
          {currentWeek&&(
            <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px"}}>
              <div style={{fontSize:14,fontWeight:500,marginBottom:4}}>This week — Week {currentWeekIdx+1}</div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>{cwDone}/{cwTotal} tasks completed</div>
              {currentWeek.tasks.slice(0,4).map((task,i)=>{
                const isDone=!!checked[task.id];
                return(
                  <div key={i} onClick={()=>toggleTask(task.id)} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"7px 0",borderTop:i>0?"0.5px solid #f3f4f6":"none",cursor:"pointer",opacity:isDone?0.5:1}}>
                    <div style={{width:16,height:16,borderRadius:4,border:isDone?"none":"1.5px solid #d1d5db",background:isDone?"#22c55e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
                      {isDone&&<span style={{color:"white",fontSize:10,fontWeight:700}}>✓</span>}
                    </div>
                    <span style={{fontSize:12,lineHeight:1.4,textDecoration:isDone?"line-through":"none"}}>{task.label}</span>
                  </div>
                );
              })}
              {cwTotal>4&&<div style={{fontSize:12,color:"#6b7280",marginTop:8,paddingTop:8,borderTop:"0.5px solid #f3f4f6"}}>+{cwTotal-4} more — <button onClick={()=>{setActiveWeek(currentWeekIdx);setView("plan");}} style={{fontSize:12,color:"#4f46e5",background:"none",border:"none",cursor:"pointer",textDecoration:"underline",fontFamily:"inherit"}}>view full week</button></div>}
            </div>
          )}
        </>
      )}

      {/* ── WEEKLY PLAN ── */}
      {view==="plan"&&(
        <>
          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            {["all","regular","ai"].map(f=>(
              <button key={f} onClick={()=>setFilter(f)}
                style={{background:filter===f?(f==="ai"?"#eef2ff":"#f3f4f6"):"transparent",border:"0.5px solid "+(filter===f?(f==="ai"?"#6366f1":"#d1d5db"):"#e5e7eb"),borderRadius:6,padding:"4px 12px",fontSize:12,cursor:"pointer",color:filter===f?(f==="ai"?"#4f46e5":"#111827"):"#6b7280",fontFamily:"inherit"}}>
                {f==="all"?"All tasks":f==="ai"?"🤖 AI only":"Regular only"}
              </button>
            ))}
          </div>
          <p style={{fontSize:12,color:"#9ca3af",marginBottom:12}}>At <strong style={{color:"#4f46e5"}}>{paceObj.label}</strong> — {paceObj.tasksPerWeek} tasks per week across {totalWeeks} weeks. Tasks from multiple original months may appear in the same week.</p>
          {schedule.map((wk,wi)=>{
            const wDone=wk.tasks.filter(t=>checked[t.id]).length;
            const isOpen=!!expandedWeeks[wi];
            const isCurrent=wi===currentWeekIdx;
            const mColors=[...new Set(wk.milestones)].map(m=>MILESTONES.find(x=>x.id===m)?.color||"#6b7280");
            const filteredTasks=wk.tasks.filter(t=>filter==="all"||(filter==="ai"&&t.ai)||(filter==="regular"&&!t.ai));
            return(
              <div key={wi} className="wk-card" style={{background:"#fff",border:"0.5px solid "+(isCurrent?"#6366f1":"#e5e7eb"),borderRadius:12,marginBottom:8,overflow:"hidden"}}>
                <div onClick={()=>toggleWeek(wi)} style={{padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",background:isCurrent?"#fafafe":"transparent"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {/* milestone color dots */}
                    <div style={{display:"flex",gap:3}}>
                      {mColors.map((c,ci)=><div key={ci} style={{width:8,height:8,borderRadius:"50%",background:c}}/>)}
                    </div>
                    <div>
                      <span style={{fontSize:13,fontWeight:500}}>Week {wk.weekNum}</span>
                      {isCurrent&&<span style={{fontSize:10,background:"#eef2ff",color:"#4f46e5",borderRadius:4,padding:"1px 6px",marginLeft:6,fontWeight:500}}>current</span>}
                      <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>
                        {[...new Set(wk.milestones)].map(m=>MILESTONES.find(x=>x.id===m)?.title).join(" · ")}
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:12,color:wDone===wk.tasks.length?"#16a34a":"#9ca3af"}}>{wDone}/{wk.tasks.length}</span>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{isOpen?"▲":"▼"}</span>
                  </div>
                </div>
                {isOpen&&(
                  <div style={{padding:"0 0 8px"}}>
                    {filteredTasks.map((task,ti)=>{
                      const isDone=!!checked[task.id];
                      return(
                        <div key={ti} onClick={()=>toggleTask(task.id)} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 14px",borderTop:"0.5px solid #f9fafb",cursor:"pointer",background:task.ai?"#fafafe":isDone?"#f9fafb":"white"}}>
                          <div style={{width:16,height:16,borderRadius:4,border:isDone?"none":"1.5px solid #d1d5db",background:isDone?"#22c55e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
                            {isDone&&<span style={{color:"white",fontSize:10,fontWeight:700}}>✓</span>}
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:task.ai||task.isNew?3:0}}>
                              {task.ai&&<span className="ai-badge" style={{fontSize:9,fontWeight:500,background:"#eef2ff",color:"#4338ca",borderRadius:4,padding:"1px 5px"}}>AI task</span>}
                              {task.isNew&&<span style={{fontSize:9,fontWeight:500,background:"#f0fdf4",color:"#15803d",borderRadius:4,padding:"1px 5px"}}>new</span>}
                              <span className="src-tag" style={{fontSize:9,background:"#f3f4f6",color:"#6b7280",borderRadius:4,padding:"1px 5px"}}>M{task.milestone} W{task.origWeek%4||4}</span>
                            </div>
                            {task.url?(
                              <a href={task.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
                                style={{fontSize:12,lineHeight:1.5,color:task.ai?"#6366f1":"#4f46e5",textDecoration:isDone?"line-through":"underline",opacity:isDone?0.5:1,display:"block",wordBreak:"break-word"}}>
                                {task.label} ↗
                              </a>
                            ):(
                              <span style={{fontSize:12,lineHeight:1.5,color:"#374151",textDecoration:isDone?"line-through":"none",opacity:isDone?0.5:1,display:"block"}}>{task.label}</span>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </>
      )}

      {/* ── MILESTONES ── */}
      {view==="milestones"&&(
        <>
          <p style={{fontSize:13,color:"#6b7280",marginBottom:14}}>Milestones are the 6 learning topics of your plan. Your pace determines how many calendar weeks each milestone takes.</p>
          {msProg.map((ms,i)=>(
            <div key={i} className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"14px 16px",marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div>
                  <div style={{fontSize:11,fontWeight:500,color:ms.color,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>{ms.label} · {ms.phase}</div>
                  <div style={{fontSize:15,fontWeight:500}}>{ms.title}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                  <div style={{fontSize:13,fontWeight:500,color:ms.pct===100?"#16a34a":"#374151"}}>{ms.done}/{ms.total}</div>
                  <div style={{fontSize:11,color:"#9ca3af"}}>tasks</div>
                </div>
              </div>
              <div style={{height:6,borderRadius:99,background:"#e5e7eb",overflow:"hidden",marginTop:8}}>
                <div style={{height:"100%",width:ms.pct+"%",background:ms.color,borderRadius:99,transition:"width 0.4s"}}/>
              </div>
              <div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>{ms.pct}% complete · ~{Math.ceil(ms.total/paceObj.tasksPerWeek)} weeks at {paceObj.label}</div>
            </div>
          ))}
        </>
      )}

      {/* ── PHASE 2 ── */}
      {view==="phase2"&&(
        <>
          <div style={{background:"#0c4a6e",borderRadius:12,padding:"16px 18px",marginBottom:16}}>
            <div style={{fontSize:10,color:"#7dd3fc",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Phase 2 · After DevSecOps role</div>
            <div style={{fontSize:18,fontWeight:500,color:"#fff",marginBottom:6}}>DevOps Engineer roadmap</div>
            <div style={{fontSize:13,color:"#bae6fd",lineHeight:1.6}}>Once you've been in a DevSecOps role for 3–6 months, Phase 2 builds the deeper DevOps skills that open up senior and lead roles. This is optional — many DevSecOps engineers never need to go this deep.</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {PHASE2_TOPICS.map((t,i)=>(
              <div key={i} className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"14px"}}>
                <div style={{fontSize:20,marginBottom:6}}>{t.icon}</div>
                <div style={{fontSize:14,fontWeight:500,marginBottom:3}}>{t.title}</div>
                <div style={{fontSize:12,color:"#6b7280"}}>{t.desc}</div>
              </div>
            ))}
          </div>
          <div style={{...nudgeSt.info,borderRadius:10,padding:"12px 14px",fontSize:13}}>A full Phase 2 plan can be generated when you're ready — tailored to what you've learned in Phase 1.</div>
        </>
      )}

      {/* ── SETUP ── */}
      {view==="setup"&&(
        <>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:4}}>Study pace</div>
            <p style={{fontSize:13,color:"#6b7280",marginBottom:12}}>Changing your pace rebuilds the entire weekly schedule. Your completed task checkboxes are preserved.</p>
            <PaceSelector value={pace} onChange={handlePaceChange}/>
            <div style={{background:"#f0f9ff",border:"0.5px solid #bae6fd",borderRadius:8,padding:"10px 14px",marginTop:12,fontSize:13,color:"#0c4a6e"}}>
              At <strong>{paceObj.label}</strong>: <strong>{paceObj.tasksPerWeek} tasks/week</strong> → ~<strong>{schedule.length} weeks</strong> total
            </div>
          </div>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:8}}>Start date</div>
            <p style={{fontSize:13,color:"#6b7280",marginBottom:10}}>Used to calculate your current week and power dashboard nudges.</p>
            <input type="date" value={startDate} onChange={e=>{setStartDate(e.target.value);saveAll(undefined,e.target.value);}} style={{width:"100%",fontSize:14,padding:"8px 10px",borderRadius:8,border:"0.5px solid #d1d5db",fontFamily:"inherit"}}/>
            {startDate&&<p style={{fontSize:12,color:"#16a34a",marginTop:8}}>Start date saved. Nudges are active.</p>}
          </div>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:10}}>Google Calendar — weekly study block</div>
            {[`Open Google Calendar → click your preferred study day`,`Set title: 'DevSecOps Study Session'`,`Set duration: ${paceObj.hrs<=2?"1–2 hours":paceObj.hrs<=3?"2–3 hours":paceObj.hrs<=5?"4–5 hours":"6+ hours"} to match your ${paceObj.label} pace`,"Click 'More options' → Repeat: Every week","Add notification: 30 minutes before","Paste this app's URL in the description","Save"].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"#eef2ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,color:"#4f46e5",flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:13,lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px"}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:10}}>Gmail — weekly self-reminder</div>
            {["Open Gmail → compose new email to yourself","Subject: 'DevSecOps — weekly check-in'","Body: What did I complete? What's next? Am I on track?","Click arrow next to Send → 'Schedule send'","Pick next Monday morning (e.g. 8am)","Reschedule each week — takes 2 minutes"].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"#f0fdf4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,color:"#16a34a",flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:13,lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
