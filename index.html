<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevSecOps Learning Tracker</title>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f9fafb;color:#111827;min-height:100vh}
input[type=date]{font-family:inherit}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#f1f1f1}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
@media(prefers-color-scheme:dark){
  body{background:#18181b;color:#f4f4f5}
  .card{background:#27272a!important;border-color:#3f3f46!important}
  .nav-btn.active{background:#3f3f46!important;color:#f4f4f5!important}
  .metric{background:#27272a!important;border-color:#3f3f46!important}
  input[type=date]{background:#27272a;color:#f4f4f5;border-color:#3f3f46}
  .week-sep{border-color:#3f3f46!important}
  .task-link{color:#818cf8!important}
  .ai-badge{background:#312e81!important;color:#c7d2fe!important}
}
</style>
</head>
<body>
<div id="root"></div>

      {label:"🤖 AI: Ask Claude to explain each OWASP Top 10 vulnerability using a QA testing analogy",url:"https://claude.ai",ai:true},

      {label:"TryHackMe — Pre-Security Network Fundamentals",url:"https://tryhackme.com/room/whatisnetworking"},

      {label:"PTES — Penetration Testing Execution Standard",url:"http://www.pentest-standard.org/index.php/Main_Page"},
      {label:"TryHackMe — Intro to Offensive Security",url:"https://tryhackme.com/room/introtooffensivesecurity"},

      {label:"TryHackMe — Nmap room",url:"https://tryhackme.com/room/furthernmap"},
      {label:"Download Nmap & scan your own machine (127.0.0.1)",url:"https://nmap.org/download.html"},
      {label:"🤖 AI: Paste your Nmap scan output into Claude — 'interpret these results, what should I investigate further?'",url:"https://claude.ai",ai:true},

    {week:3,title:"Burp Suite & web app testing",tasks:[

      {label:"TryHackMe — OWASP Top 10 room",url:"https://tryhackme.com/room/owasptop10"},
      {label:"OWASP WebGoat — deliberately vulnerable app",url:"https://owasp.org/www-project-webgoat/"},

      {label:"TryHackMe — Basic Pentesting CTF room",url:"https://tryhackme.com/room/basicpentestingjt"},
      {label:"Write a mini pen test report",url:null},
      {label:"🤖 AI: Paste your CTF notes into Claude — 'turn these into a professional pen test report with findings, risk ratings, and remediation'",url:"https://claude.ai",ai:true},
    ]},
  ]},
  {month:5,phase:"Phase 4",title:"DevSecOps Integration",weeks:[
    {week:1,title:"SAST & code scanning",tasks:[
      {label:"YouTube — What is SAST vs DAST? by Snyk",url:"https://www.youtube.com/watch?v=_IXBqBMDheE"},
      {label:"Semgrep — Add SAST scanning to your GitHub Actions pipeline",url:"https://semgrep.dev/docs/semgrep-ci/overview/"},
      {label:"Snyk — Create free account & scan a public repo",url:"https://snyk.io"},
      {label:"🤖 AI: Paste a Snyk/Semgrep finding into Claude — 'explain this vulnerability, real-world risk, and how to fix it'",url:"https://claude.ai",ai:true},
    ]},
    {week:2,title:"Secrets & dependency security",tasks:[
      {label:"GitHub — Enable Secret Scanning & Dependabot",url:"https://docs.github.com/en/code-security/secret-scanning/about-secret-scanning"},
      {label:"TryHackMe — OWASP Top 10 2021 room",url:"https://tryhackme.com/room/owasptop102021"},
      {label:"GitGuardian — State of Secrets Sprawl report",url:"https://www.gitguardian.com/state-of-secrets-sprawl"},
      {label:"🤖 AI: Paste your pipeline YAML into Claude — 'identify every security risk and misconfiguration in this workflow'",url:"https://claude.ai",ai:true},
    ]},
    {week:3,title:"AWS cloud security",tasks:[
      {label:"YouTube — AWS Security Hub Overview",url:"https://www.youtube.com/watch?v=o0NDi01YPXs"},

      {label:"🤖 AI: Paste GuardDuty findings into Claude — 'which are high priority and what should I do about each one?'",url:"https://claude.ai",ai:true},

    {week:4,title:"Portfolio pipeline project",tasks:[
      {label:"GitHub — Build pipeline with 3 security gates (Semgrep + Snyk + secrets)",url:"https://github.com"},
      {label:"Write README documenting your secure pipeline",url:null},
      {label:"Month 5 gate check self-assessment",url:null},
      {label:"🤖 AI: Ask Claude to help write a 200-word hiring manager description of your pipeline project",url:"https://claude.ai",ai:true},
    ]},
  ]},
  {month:6,phase:"Phase 4",title:"Security+ Final Prep & Exam",weeks:[
    {week:1,title:"Weak domain blitz",tasks:[
      {label:"Jason Dion — Security+ Practice Exam (2nd attempt)",url:"https://www.udemy.com/course/comptia-security-practice-exams/"},
      {label:"Professor Messer — Rewatch your 2 weakest domains",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/sy0-701-comptia-security-plus-course/"},
      {label:"Quizlet — Review full flashcard deck",url:"https://quizlet.com"},
      {label:"🤖 AI: Ask Claude to aggressively quiz you on your weakest domains — explain every wrong answer",url:"https://claude.ai",ai:true},
    ]},
    {week:2,title:"PBQs & exam technique",tasks:[
      {label:"YouTube — Security+ PBQ Walkthrough by Professor Messer",url:"https://www.youtube.com/watch?v=_nyZhYnCNLA"},
      {label:"Jason Dion — Full timed practice exam (new set)",url:"https://www.udemy.com/course/comptia-security-practice-exams/"},
      {label:"CompTIA — Official Security+ exam objectives (skim)",url:"https://www.comptia.org/training/resources/exam-objectives"},
      {label:"🤖 AI: Ask Claude to give you 5 PBQ scenarios with step-by-step walkthroughs focused on network diagrams",url:"https://claude.ai",ai:true},
    ]},
    {week:3,title:"Final consolidation & booking",tasks:[
      {label:"Jason Dion — Final full practice exam (target 85%+)",url:"https://www.udemy.com/course/comptia-security-practice-exams/"},
      {label:"Book Security+ exam via Pearson VUE",url:"https://home.pearsonvue.com/comptia"},
      {label:"Update LinkedIn & CV with all new skills",url:"https://linkedin.com"},
      {label:"🤖 AI: Ask Claude to rewrite your LinkedIn summary to highlight your DevSecOps transition",url:"https://claude.ai",ai:true},
    ]},
    {week:4,title:"Exam week",tasks:[
      {label:"Light review — compile all wrong answers from all practice exams",url:null},
      {label:"Professor Messer — Last-Minute Security+ study notes",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-study-groups/"},
      {label:"Take your Security+ exam via Pearson VUE 🎯",url:"https://home.pearsonvue.com/comptia"},
      {label:"🤖 AI: Night before exam — ask Claude for a 10-minute rapid-fire review of the most tested Security+ concepts",url:"https://claude.ai",ai:true},
    ]},

];

const STORAGE_KEY="devsecops_v3";
const START_KEY="devsecops_start";
const phaseColors={"Phase 1":"#4f46e5","Phase 2":"#0891b2","Phase 3":"#dc2626","Phase 4":"#16a34a"};
const nudgeStyle={warn:{background:"#fefce8",border:"0.5px solid #fde68a",color:"#92400e"},success:{background:"#f0fdf4",border:"0.5px solid #bbf7d0",color:"#15803d"},info:{background:"#eff6ff",border:"0.5px solid #bfdbfe",color:"#1e40af"}};

function getNudge(checked,startDate){
  if(!startDate)return{msg:"Set your start date in Setup to activate weekly nudges.",type:"info"};
  const now=new Date(),start=new Date(startDate);
  const daysSince=Math.floor((now-start)/86400000);
  const weekIdx=Math.min(Math.floor(daysSince/7),23);
  const dow=daysSince%7;
  const m=PLAN[Math.floor(weekIdx/4)],w=m?.weeks[weekIdx%4];
  const wDone=w?.tasks.filter((_,ti)=>checked[`${weekIdx}-${ti}`]).length||0;
  const wTotal=w?.tasks.length||0;
  const total=PLAN.flatMap(m=>m.weeks.flatMap(w=>w.tasks)).length;
  const done=Object.values(checked).filter(Boolean).length;
  const pct=Math.round((done/total)*100);
  if(dow>=3&&wDone===0)return{msg:`Midweek check-in: you haven't started this week's tasks yet. Even 30 minutes today keeps momentum alive.`,type:"warn"};
  if(dow>=5&&wDone<wTotal)return{msg:`Weekend reminder: ${wTotal-wDone} task(s) left this week. A quick session now keeps you on track.`,type:"warn"};
  if(wDone===wTotal&&wTotal>0)return{msg:`This week's tasks are all done! You're ${pct}% through the full plan. Great work.`,type:"success"};
  if(done===0)return{msg:"Your journey starts with a single task. Open Month 1 and click the first resource to begin.",type:"info"};
  return{msg:`You're ${pct}% through the 6-month plan. Consistency beats intensity — keep showing up.`,type:"info"};
}

function App(){
  const[checked,setChecked]=useState({});
  const[startDate,setStartDate]=useState("");
  const[view,setView]=useState("dashboard");
  const[activeMonth,setActiveMonth]=useState(0);
  const[expandedWeeks,setExpandedWeeks]=useState({"0-0":true});
  const[filter,setFilter]=useState("all");

  useEffect(()=>{
    try{const c=localStorage.getItem(STORAGE_KEY),d=localStorage.getItem(START_KEY);if(c)setChecked(JSON.parse(c));if(d)setStartDate(d);}catch{}
  },[]);

  const save=(nc,nd)=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(nc));if(nd!==undefined)localStorage.setItem(START_KEY,nd);}catch{}};
  const toggleTask=(key,e)=>{e.stopPropagation();const next={...checked,[key]:!checked[key]};setChecked(next);save(next,undefined);};
  const toggleWeek=key=>setExpandedWeeks(p=>({...p,[key]:!p[key]}));

  const allTasks=PLAN.flatMap(m=>m.weeks.flatMap(w=>w.tasks));
  const total=allTasks.length;
  const aiTotal=allTasks.filter(t=>t.ai).length;
  const done=Object.values(checked).filter(Boolean).length;
  const pct=Math.round((done/total)*100);

  const mProg=PLAN.map((m,mi)=>{
    const keys=m.weeks.flatMap((w,wi)=>w.tasks.map((_,ti)=>`${mi*4+wi}-${ti}`));
    const d=keys.filter(k=>checked[k]).length;
    return{done:d,total:keys.length,pct:Math.round((d/keys.length)*100)};
  });

  const nudge=getNudge(checked,startDate);

  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px"}}>
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:22,fontWeight:500,marginBottom:4}}>DevSecOps learning tracker</h1>
        <p style={{fontSize:13,color:"#6b7280"}}>6-month plan · {total} tasks incl. {aiTotal} AI tasks · CompTIA Security+ goal</p>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:20,borderBottom:"0.5px solid #e5e7eb",paddingBottom:12}}>
        {["dashboard","plan","setup"].map(v=>(
          <button key={v} className={`nav-btn${view===v?" active":""}`} onClick={()=>setView(v)}
            style={{background:view===v?"#f3f4f6":"transparent",border:"0.5px solid "+(view===v?"#d1d5db":"transparent"),borderRadius:8,padding:"6px 16px",fontSize:13,cursor:"pointer",fontWeight:view===v?500:400,fontFamily:"inherit",color:view===v?"#111827":"#6b7280"}}>
            {v==="dashboard"?"Dashboard":v==="plan"?"Full plan":"Setup"}
          </button>
        ))}
      </div>

      {view==="dashboard"&&(
        <>
          <div style={{...nudgeStyle[nudge.type],borderRadius:10,padding:"10px 14px",fontSize:13,marginBottom:16}}>{nudge.msg}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
            {[{label:"Overall progress",val:pct+"%",sub:`${done}/${total} tasks`},{label:"Tasks completed",val:done,sub:"across all months"},{label:"Remaining",val:total-done,sub:"tasks to finish"}].map((c,i)=>(
              <div key={i} className="metric" style={{background:"#f9fafb",border:"0.5px solid #e5e7eb",borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>{c.label}</div>
                <div style={{fontSize:22,fontWeight:500}}>{c.val}</div>
                <div style={{fontSize:11,color:"#9ca3af"}}>{c.sub}</div>
              </div>
            ))}
          </div>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px"}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:14}}>Monthly progress</div>
            {PLAN.map((m,i)=>(
              <div key={i} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                  <span style={{fontWeight:500}}>Month {m.month} — {m.title}</span>
                  <span style={{color:"#6b7280"}}>{mProg[i].done}/{mProg[i].total}</span>
                </div>
                <div style={{height:5,borderRadius:99,background:"#e5e7eb",overflow:"hidden"}}>
                  <div style={{height:"100%",width:mProg[i].pct+"%",background:phaseColors[m.phase],borderRadius:99,transition:"width 0.4s"}}/>
                </div>
                <div style={{fontSize:11,color:"#9ca3af",marginTop:3}}>{m.phase} · {mProg[i].pct}% complete</div>
              </div>
            ))}
          </div>
        </>
      )}

      {view==="plan"&&(
        <>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
            {PLAN.map((m,i)=>(
              <button key={i} onClick={()=>setActiveMonth(i)}
                style={{background:activeMonth===i?phaseColors[m.phase]+"18":"transparent",border:"0.5px solid "+(activeMonth===i?phaseColors[m.phase]:"#e5e7eb"),borderRadius:8,padding:"5px 14px",fontSize:13,cursor:"pointer",color:activeMonth===i?phaseColors[m.phase]:"#6b7280",fontWeight:activeMonth===i?500:400,fontFamily:"inherit"}}>
                M{m.month}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            {["all","regular","ai"].map(f=>(
              <button key={f} onClick={()=>setFilter(f)}
                style={{background:filter===f?(f==="ai"?"#eef2ff":"#f3f4f6"):"transparent",border:"0.5px solid "+(filter===f?(f==="ai"?"#6366f1":"#d1d5db"):"#e5e7eb"),borderRadius:6,padding:"4px 12px",fontSize:12,cursor:"pointer",color:filter===f?(f==="ai"?"#4f46e5":"#111827"):"#6b7280",fontFamily:"inherit"}}>
                {f==="all"?"All tasks":f==="ai"?"🤖 AI tasks only":"Regular tasks only"}
              </button>
            ))}
          </div>
          {(()=>{
            const m=PLAN[activeMonth],mp=mProg[activeMonth];
            return(
              <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:500,color:phaseColors[m.phase],textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>{m.phase} · Month {m.month}</div>
                    <div style={{fontSize:16,fontWeight:500}}>{m.title}</div>
                  </div>
                  <span style={{fontSize:13,color:"#6b7280"}}>{mp.done}/{mp.total}</span>
                </div>
                <div style={{height:5,borderRadius:99,background:"#e5e7eb",overflow:"hidden",marginBottom:16}}>
                  <div style={{height:"100%",width:mp.pct+"%",background:phaseColors[m.phase],borderRadius:99,transition:"width 0.4s"}}/>
                </div>
                {m.weeks.map((w,wi)=>{
                  const wKey=`${activeMonth}-${wi}`;
                  const gIdx=activeMonth*4+wi;
                  const filteredTasks=w.tasks.filter(t=>filter==="all"||(filter==="ai"&&t.ai)||(filter==="regular"&&!t.ai));
                  if(filteredTasks.length===0)return null;
                  const wDone=w.tasks.filter((_,ti)=>checked[`${gIdx}-${ti}`]).length;
                  const open=!!expandedWeeks[wKey];
                  return(
                    <div key={wi}>
                      <div className="week-sep" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",cursor:"pointer",borderTop:"0.5px solid #f3f4f6"}} onClick={()=>toggleWeek(wKey)}>
                        <div>
                          <span style={{fontSize:11,color:"#9ca3af"}}>Week {w.week} · </span>
                          <span style={{fontSize:14,fontWeight:500}}>{w.title}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:12,color:wDone===w.tasks.length?"#16a34a":"#9ca3af"}}>{wDone}/{w.tasks.length}</span>
                          <span style={{fontSize:11,color:"#9ca3af"}}>{open?"▲":"▼"}</span>
                        </div>
                      </div>
                      {open&&filteredTasks.map((task)=>{
                        const ti=w.tasks.indexOf(task);
                        const tKey=`${gIdx}-${ti}`;
                        const isDone=!!checked[tKey];
                        return(
                          <div key={ti} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"9px 0 9px 4px",borderTop:"0.5px solid #f9fafb",background:task.ai?"#fafafa":"transparent"}}>
                            <div onClick={e=>toggleTask(tKey,e)}
                              style={{width:18,height:18,borderRadius:5,border:isDone?"none":"1.5px solid #d1d5db",background:isDone?"#22c55e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2,cursor:"pointer"}}>
                              {isDone&&<span style={{color:"white",fontSize:11,fontWeight:600}}>✓</span>}
                            </div>
                            <div style={{flex:1,minWidth:0}}>
                              {task.ai&&<span className="ai-badge" style={{display:"inline-block",fontSize:10,fontWeight:500,background:"#eef2ff",color:"#4338ca",borderRadius:4,padding:"1px 6px",marginBottom:4}}>AI task</span>}
                              {task.url?(
                                <a href={task.url} target="_blank" rel="noopener noreferrer"
                                  style={{fontSize:13,lineHeight:1.5,color:task.ai?"#6366f1":"#4f46e5",textDecoration:isDone?"line-through":"underline",opacity:isDone?0.5:1,display:"block",wordBreak:"break-word"}}>
                                  {task.label} ↗
                                </a>
                              ):(
                                <span style={{fontSize:13,lineHeight:1.5,color:"#374151",textDecoration:isDone?"line-through":"none",opacity:isDone?0.5:1,display:"block"}}>
                                  {task.label}
                                </span>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </>
      )}

      {view==="setup"&&(
        <>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:8}}>Start date</div>
            <p style={{fontSize:13,color:"#6b7280",marginBottom:10}}>Set the date you began Month 1. This powers the weekly nudge messages on the dashboard.</p>
            <input type="date" value={startDate} onChange={e=>{setStartDate(e.target.value);save(checked,e.target.value);}} style={{width:"100%",fontSize:14,padding:"8px 10px",borderRadius:8,border:"0.5px solid #d1d5db",fontFamily:"inherit"}}/>
            {startDate&&<p style={{fontSize:12,color:"#16a34a",marginTop:8}}>Start date saved. Nudges are active on the dashboard.</p>}
          </div>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:10}}>Google Calendar — weekly study block</div>
            {["Open Google Calendar and click your preferred study day/time","Set title: 'DevSecOps Study Session'","Set duration: 2 hours","Click 'More options' → Repeat: Every week","Add notification: 30 minutes before","Paste this app's URL in the description for one-click access","Save"].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"#eef2ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,color:"#4f46e5",flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:13,lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:10}}>Gmail — weekly self-reminder</div>
            {["Open Gmail and compose a new email to yourself","Subject: 'DevSecOps — weekly check-in'","Body: What did I complete? What's next? Am I on track?","Click the arrow next to Send → 'Schedule send'","Pick next Monday morning (e.g. 8am)","Each week, schedule the next one — takes 2 minutes","This forces a weekly review habit"].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"#f0fdf4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,color:"#16a34a",flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:13,lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>
          <div style={{...nudgeStyle.info,borderRadius:10,padding:"10px 14px",fontSize:13}}>
            Tip: calendar block + Monday Gmail + this dashboard mid-week = 3 accountability layers that cover every reason people fall off learning plans.
          </div>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
