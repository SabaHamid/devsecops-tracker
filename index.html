    {id:"p2g4",label:"Implement a canary deployment in your GitHub Actions pipeline",url:null},
    {id:"p2g5",label:"Add policy-as-code (OPA/Gatekeeper) enforcement to a pipeline",url:"https://www.openpolicyagent.org/docs/latest/"},
    {id:"p2g6",label:"🤖 AI: Ask Claude to design a GitOps workflow with security gates for a production deployment",url:"https://claude.ai",ai:true},
  ]},
];

const P1_MS=[
  {id:1,color:"#4f46e5",tag:"DevSecOps journey · Step 1 of 6",title:"Linux & Command Line Foundations",label:"Linux & Foundations"},
  {id:2,color:"#4f46e5",tag:"DevSecOps journey · Step 2 of 6",title:"CI/CD, AWS & Docker Security",label:"CI/CD & Cloud"},
  {id:3,color:"#0891b2",tag:"DevSecOps journey · Step 3 of 6",title:"Security Fundamentals & Threat Modelling",label:"Security Fundamentals"},
  {id:4,color:"#dc2626",tag:"DevSecOps journey · Step 4 of 6",title:"Penetration Testing Basics",label:"Penetration Testing"},
  {id:5,color:"#16a34a",tag:"DevSecOps journey · Step 5 of 6",title:"DevSecOps Integration + Incident Response",label:"DevSecOps Integration"},
  {id:6,color:"#16a34a",tag:"DevSecOps journey · Step 6 of 6 · 🎯 Finish line",title:"Security+ Final Prep, Compliance & Exam",label:"Cert & Compliance"},
];

const STORAGE_KEY="dso_p1_v8";
const LEAD_KEY="dso_lead_v8";
const PACE_KEY="dso_pace_v8";
const START_KEY="dso_start_v8";
const P2_UNLOCK_KEY="dso_p2unlock_v8";

const nudgeSt={warn:{background:"#fefce8",border:"0.5px solid #fde68a",color:"#92400e"},success:{background:"#f0fdf4",border:"0.5px solid #bbf7d0",color:"#15803d"},info:{background:"#eff6ff",border:"0.5px solid #bfdbfe",color:"#1e40af"}};

function buildSchedule(paceId){
  const p=PACES.find(x=>x.id===paceId)||PACES[1];
  const weeks=[];let i=0,wn=1;
  while(i<P1_TASKS.length){
    weeks.push({weekNum:wn,tasks:P1_TASKS.slice(i,i+p.tasksPerWeek)});
    i+=p.tasksPerWeek;wn++;
  }
  return weeks;
}

function PaceSelector({value,onChange}){
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      {PACES.map(p=>(
        <button key={p.id} className={`pace-opt${value===p.id?" sel":""}`} onClick={()=>onChange(p.id)}
          style={{background:value===p.id?"#4f46e5":"transparent",border:"0.5px solid "+(value===p.id?"#4f46e5":"#e5e7eb"),borderRadius:10,padding:"11px 14px",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
          <div style={{fontSize:13,fontWeight:500,color:value===p.id?"#fff":"#111827"}}>{p.label}</div>
          <div style={{fontSize:11,color:value===p.id?"#c7d2fe":"#6b7280",marginTop:2}}>{p.desc}</div>
        </button>
      ))}
    </div>
  );
}

function Onboarding({onDone}){
  const[pace,setPace]=useState("steady");
  const p=PACES.find(x=>x.id===pace);
  const tw=Math.ceil(P1_TASKS.length/p.tasksPerWeek);
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:16,padding:"32px 28px",maxWidth:520,width:"100%"}}>
        <div style={{fontSize:28,marginBottom:8}}>👋</div>
        <h1 style={{fontSize:20,fontWeight:500,marginBottom:6}}>Welcome to your DevSecOps tracker</h1>
        <p style={{fontSize:14,color:"#6b7280",marginBottom:20,lineHeight:1.6}}>Set your weekly study pace. Your plan restructures dynamically — more hours per week means more tasks per week and a shorter timeline.</p>
        <PaceSelector value={pace} onChange={setPace}/>
        <div style={{background:"#f0f9ff",border:"0.5px solid #bae6fd",borderRadius:8,padding:"10px 14px",margin:"14px 0",fontSize:13,color:"#0c4a6e"}}>
          At <strong>{p.label}</strong>: <strong>{p.tasksPerWeek} tasks/week</strong> → Phase 1 in ~<strong>{tw} weeks</strong> (~{(tw/4.3).toFixed(1)} months)
        </div>
        <div style={{display:"flex",gap:0,marginBottom:24,borderRadius:10,overflow:"hidden"}}>
          <div style={{flex:1,background:"#4f46e5",padding:"10px 12px"}}>
            <div style={{fontSize:10,color:"#c7d2fe",marginBottom:2}}>Phase 1 · This tracker</div>
            <div style={{fontSize:13,fontWeight:500,color:"#fff"}}>DevSecOps role</div>
            <div style={{fontSize:11,color:"#c7d2fe",marginTop:2}}>Security · Pipelines · Pen testing · Cert</div>
          </div>
          <div style={{flex:1,background:"#0c4a6e",padding:"10px 12px"}}>
            <div style={{fontSize:10,color:"#bae6fd",marginBottom:2}}>Phase 2 · Unlocks after Phase 1</div>
            <div style={{fontSize:13,fontWeight:500,color:"#fff"}}>DevOps role</div>
            <div style={{fontSize:11,color:"#bae6fd",marginTop:2}}>K8s · Terraform · Python · Monitoring</div>
          </div>
        </div>
        <button onClick={()=>onDone(pace)} style={{width:"100%",background:"#4f46e5",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:15,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>Build my plan →</button>
      </div>
    </div>
  );
}

function TaskRow({task,isDone,onToggle,isLead}){
  return(
    <div onClick={onToggle} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 14px",borderTop:"0.5px solid #f9fafb",cursor:"pointer",background:task.ai?"#fafafe":isDone?"#f9fafb":"white"}}>
      <div style={{width:16,height:16,borderRadius:4,border:isDone?"none":"1.5px solid "+(isLead?"#16a34a":"#d1d5db"),background:isDone?(isLead?"#16a34a":"#22c55e"):"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
        {isDone&&<span style={{color:"white",fontSize:10,fontWeight:700}}>✓</span>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        {task.ai&&<span className="ai-badge" style={{fontSize:9,fontWeight:500,background:"#eef2ff",color:"#4338ca",borderRadius:4,padding:"1px 5px",display:"inline-block",marginBottom:3}}>AI task</span>}
        {task.url?(
          <a href={task.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
            style={{fontSize:12,lineHeight:1.5,color:task.ai?"#6366f1":"#4f46e5",textDecoration:isDone?"line-through":"underline",opacity:isDone?0.5:1,display:"block",wordBreak:"break-word"}}>
            {task.label} ↗
          </a>
        ):(
          <span style={{fontSize:12,lineHeight:1.5,color:"#374151",textDecoration:isDone?"line-through":"none",opacity:isDone?0.5:1,display:"block"}}>{task.label}</span>
        )}
      </div>
    </div>
  );
}

function App(){
  const[checked,setChecked]=useState({});
  const[leadChecked,setLeadChecked]=useState({});
  const[pace,setPace]=useState(null);
  const[startDate,setStartDate]=useState("");
  const[p2Unlocked,setP2Unlocked]=useState(false);
  const[view,setView]=useState("dashboard");
  const[p2View,setP2View]=useState("mytasks");
  const[expandedWeeks,setExpandedWeeks]=useState({0:true});
  const[expandedP2,setExpandedP2]=useState({});

  useEffect(()=>{
    try{
      const c=localStorage.getItem(STORAGE_KEY),l=localStorage.getItem(LEAD_KEY),p=localStorage.getItem(PACE_KEY),d=localStorage.getItem(START_KEY),u=localStorage.getItem(P2_UNLOCK_KEY);
      if(c)setChecked(JSON.parse(c));
      if(l)setLeadChecked(JSON.parse(l));
      if(p)setPace(p);
      if(d)setStartDate(d);
      if(u)setP2Unlocked(JSON.parse(u));
    }catch{}
  },[]);

  const saveChecked=v=>{setChecked(v);try{localStorage.setItem(STORAGE_KEY,JSON.stringify(v));}catch{}};
  const saveLeadChecked=v=>{setLeadChecked(v);try{localStorage.setItem(LEAD_KEY,JSON.stringify(v));}catch{}};
  const savePace=v=>{setPace(v);try{localStorage.setItem(PACE_KEY,v);}catch{}};
  const saveDate=v=>{setStartDate(v);try{localStorage.setItem(START_KEY,v);}catch{}};
  const unlockP2=(v)=>{setP2Unlocked(v);try{localStorage.setItem(P2_UNLOCK_KEY,JSON.stringify(v));}catch{}};

  if(!pace)return<Onboarding onDone={v=>{savePace(v);}}/>;

  const paceObj=PACES.find(x=>x.id===pace)||PACES[1];
  const schedule=buildSchedule(pace);
  const totalWeeks=schedule.length;
  const p1Done=P1_TASKS.filter(t=>checked[t.id]).length;
  const p1Total=P1_TASKS.length;
  const p1Pct=Math.round((p1Done/p1Total)*100);
  const isP2Available=p1Pct===100||p2Unlocked;

  let currentWeekIdx=0;
  if(startDate){const d=Math.floor((new Date()-new Date(startDate))/86400000);currentWeekIdx=Math.min(Math.floor(d/7),totalWeeks-1);}
  const cw=schedule[currentWeekIdx];
  const cwDone=cw?cw.tasks.filter(t=>checked[t.id]).length:0;
  const cwTotal=cw?cw.tasks.length:0;
  const dow=startDate?Math.floor((new Date()-new Date(startDate))/86400000)%7:0;

  let nudge={msg:`${p1Pct}% of Phase 1 complete at ${paceObj.label}. ${totalWeeks-currentWeekIdx} weeks remaining.`,type:"info"};
  if(!startDate)nudge={msg:"Set your start date in Setup to activate weekly nudges.",type:"info"};
  else if(dow>=3&&cwDone===0)nudge={msg:`Midweek check-in: Week ${currentWeekIdx+1} not started. You have ${cwTotal} tasks this week at ${paceObj.label}.`,type:"warn"};
  else if(dow>=5&&cwDone<cwTotal)nudge={msg:`Weekend: ${cwTotal-cwDone} task(s) left in Week ${currentWeekIdx+1}. Finish strong!`,type:"warn"};
  else if(cwDone===cwTotal&&cwTotal>0)nudge={msg:`Week ${currentWeekIdx+1} complete! ${p1Pct}% through Phase 1.`,type:"success"};

  const msProg=P1_MS.map(ms=>{
    const tasks=P1_TASKS.filter(t=>t.ms===ms.id);
    const d=tasks.filter(t=>checked[t.id]).length;
    const wks=Math.ceil(tasks.length/paceObj.tasksPerWeek);
    return{...ms,done:d,total:tasks.length,pct:Math.round((d/tasks.length)*100),wks,mos:(wks/4.3).toFixed(1)};
  });

  const p2AllTasks=P2_TOPICS.flatMap(t=>t.tasks);
  const p2Done=p2AllTasks.filter(t=>checked[t.id]).length;
  const p2LeadDone=p2AllTasks.filter(t=>leadChecked[t.id]).length;

  return(
    <div style={{maxWidth:720,margin:"0 auto",padding:"20px 16px"}}>
      <div style={{marginBottom:16}}>
        <h1 style={{fontSize:22,fontWeight:500,marginBottom:4}}>DevSecOps learning tracker</h1>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:13,color:"#6b7280"}}>Phase 1: {p1Done}/{p1Total} · Phase 2: {p2Done}/{p2AllTasks.length}</span>
          <span style={{fontSize:11,background:"#eef2ff",color:"#4f46e5",borderRadius:6,padding:"2px 8px",fontWeight:500}}>📅 {paceObj.label} · {paceObj.tasksPerWeek} tasks/wk · ~{totalWeeks} wks</span>
          <button onClick={()=>setPace(null)} style={{fontSize:11,color:"#9ca3af",background:"transparent",border:"none",cursor:"pointer",textDecoration:"underline",fontFamily:"inherit"}}>change pace</button>
        </div>
      </div>

      {/* Career phase banner */}
      <div style={{display:"flex",borderRadius:12,overflow:"hidden",marginBottom:16}}>
        <div style={{flex:1,background:"#4f46e5",padding:"10px 14px"}}>
          <div style={{fontSize:10,color:"#c7d2fe",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>Phase 1 · {p1Pct}% complete · ~{totalWeeks} weeks</div>
          <div style={{fontSize:13,fontWeight:500,color:"#fff"}}>DevSecOps role</div>
          <div style={{fontSize:11,color:"#c7d2fe",marginTop:2}}>Security · Pen testing · CI/CD · Security+ · IR · Compliance</div>
        </div>
        <div style={{flex:1,background:isP2Available?"#0c4a6e":"#1e293b",padding:"10px 14px"}}>
          <div style={{fontSize:10,color:isP2Available?"#7dd3fc":"#64748b",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>Phase 2 · {isP2Available?"Unlocked ✓":"Unlocks after Phase 1"}</div>
          <div style={{fontSize:13,fontWeight:500,color:isP2Available?"#fff":"#94a3b8"}}>DevOps role</div>
          <div style={{fontSize:11,color:isP2Available?"#7dd3fc":"#64748b",marginTop:2}}>K8s · Terraform · Python · AWS · Monitoring · GitOps</div>
        </div>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:20,borderBottom:"0.5px solid #e5e7eb",paddingBottom:12,flexWrap:"wrap"}}>
        {["dashboard","phase1","milestones","phase2","setup"].map(v=>(
          <button key={v} className={`nav-btn${view===v?" active":""}`} onClick={()=>setView(v)}
            style={{background:view===v?"#f3f4f6":"transparent",border:"0.5px solid "+(view===v?"#d1d5db":"transparent"),borderRadius:8,padding:"6px 12px",fontSize:13,cursor:"pointer",fontWeight:view===v?500:400,fontFamily:"inherit",color:view===v?"#111827":"#6b7280"}}>
            {v==="dashboard"?"Dashboard":v==="phase1"?"Phase 1 plan":v==="milestones"?"Milestones":"Phase 2 plan"===v?"Phase 2 plan":v==="phase2"?"Phase 2 plan":"Setup"}
          </button>
        ))}
      </div>

      {/* ── DASHBOARD ── */}
      {view==="dashboard"&&(
        <>
          <div style={{...nudgeSt[nudge.type],borderRadius:10,padding:"10px 14px",fontSize:13,marginBottom:16}}>{nudge.msg}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[
              {label:"Phase 1 progress",val:p1Pct+"%",sub:`${p1Done}/${p1Total} tasks`},
              {label:"Phase 2 progress",val:p2Done===0?"Not started":Math.round((p2Done/p2AllTasks.length)*100)+"%",sub:`${p2Done}/${p2AllTasks.length} tasks`},
              {label:"Lead verified",val:p2LeadDone,sub:`of ${p2AllTasks.length} P2 tasks`},
            ].map((c,i)=>(
              <div key={i} className="metric" style={{background:"#f9fafb",border:"0.5px solid #e5e7eb",borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>{c.label}</div>
                <div style={{fontSize:22,fontWeight:500}}>{c.val}</div>
                <div style={{fontSize:11,color:"#9ca3af"}}>{c.sub}</div>
              </div>
            ))}
          </div>
          {/* Phase 1 progress bar */}
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"14px 16px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
              <span style={{fontWeight:500}}>Phase 1 — DevSecOps role</span><span style={{color:"#6b7280"}}>{p1Pct}%</span>
            </div>
            <div style={{height:7,borderRadius:99,background:"#e5e7eb",overflow:"hidden"}}>
              <div style={{height:"100%",width:p1Pct+"%",background:"#4f46e5",borderRadius:99,transition:"width 0.4s"}}/>
            </div>
          </div>
          {/* Phase 2 progress bar */}
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"14px 16px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
              <span style={{fontWeight:500}}>Phase 2 — DevOps role</span>
              <span style={{color:isP2Available?"#6b7280":"#9ca3af"}}>{isP2Available?Math.round((p2Done/p2AllTasks.length)*100)+"%":"Locked"}</span>
            </div>
            <div style={{height:7,borderRadius:99,background:"#e5e7eb",overflow:"hidden"}}>
              <div style={{height:"100%",width:isP2Available?Math.round((p2Done/p2AllTasks.length)*100)+"%":"0%",background:"#0891b2",borderRadius:99,transition:"width 0.4s"}}/>
            </div>
            {p2LeadDone>0&&<div style={{fontSize:11,color:"#16a34a",marginTop:4}}>Lead verified: {p2LeadDone}/{p2AllTasks.length} tasks ✓</div>}
          </div>
          {/* This week preview */}
          {cw&&(
            <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"14px 16px"}}>
              <div style={{fontSize:14,fontWeight:500,marginBottom:4}}>This week — Week {currentWeekIdx+1} of {totalWeeks}</div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:10}}>{cwDone}/{cwTotal} tasks completed</div>
              {cw.tasks.slice(0,4).map((t,i)=>{
                const isDone=!!checked[t.id];
                return(
                  <div key={i} onClick={()=>{const n={...checked,[t.id]:!checked[t.id]};saveChecked(n);}} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"6px 0",borderTop:i>0?"0.5px solid #f3f4f6":"none",cursor:"pointer",opacity:isDone?0.5:1}}>
                    <div style={{width:15,height:15,borderRadius:4,border:isDone?"none":"1.5px solid #d1d5db",background:isDone?"#22c55e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
                      {isDone&&<span style={{color:"white",fontSize:9,fontWeight:700}}>✓</span>}
                    </div>
                    <span style={{fontSize:12,lineHeight:1.4,textDecoration:isDone?"line-through":"none"}}>{t.label}</span>
                  </div>
                );
              })}
              {cwTotal>4&&<div style={{fontSize:12,color:"#6b7280",marginTop:8,paddingTop:6,borderTop:"0.5px solid #f3f4f6"}}>+{cwTotal-4} more — <button onClick={()=>setView("phase1")} style={{fontSize:12,color:"#4f46e5",background:"none",border:"none",cursor:"pointer",textDecoration:"underline",fontFamily:"inherit"}}>see full week</button></div>}
            </div>
          )}
        </>
      )}

      {/* ── PHASE 1 WEEKLY PLAN ── */}
      {view==="phase1"&&(
        <>
          <p style={{fontSize:12,color:"#9ca3af",marginBottom:12}}>At <strong style={{color:"#4f46e5"}}>{paceObj.label}</strong> — {paceObj.tasksPerWeek} tasks/week across {totalWeeks} weeks.</p>
          {schedule.map((wk,wi)=>{
            const wDone=wk.tasks.filter(t=>checked[t.id]).length;
            const isOpen=!!expandedWeeks[wi];
            const isCurrent=wi===currentWeekIdx;
            return(
              <div key={wi} className="wk-card" style={{background:"#fff",border:"0.5px solid "+(isCurrent?"#6366f1":"#e5e7eb"),borderRadius:12,marginBottom:8,overflow:"hidden"}}>
                <div onClick={()=>setExpandedWeeks(p=>({...p,[wi]:!p[wi]}))} style={{padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",background:isCurrent?"#fafafe":"transparent"}}>
                  <div>
                    <span style={{fontSize:13,fontWeight:500}}>Week {wk.weekNum}</span>
                    {isCurrent&&<span style={{fontSize:10,background:"#eef2ff",color:"#4f46e5",borderRadius:4,padding:"1px 6px",marginLeft:6,fontWeight:500}}>current</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:12,color:wDone===wk.tasks.length?"#16a34a":"#9ca3af"}}>{wDone}/{wk.tasks.length}</span>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{isOpen?"▲":"▼"}</span>
                  </div>
                </div>
                {isOpen&&wk.tasks.map((task,ti)=>(
                  <TaskRow key={ti} task={task} isDone={!!checked[task.id]} onToggle={()=>{const n={...checked,[task.id]:!checked[task.id]};saveChecked(n);}}/>
                ))}
              </div>
            );
          })}
        </>
      )}

      {/* ── MILESTONES ── */}
      {view==="milestones"&&(
        <>
          <p style={{fontSize:13,color:"#6b7280",marginBottom:14}}>6 learning milestones in your DevSecOps journey. Pace determines how many weeks each takes.</p>
          {msProg.map((ms,i)=>(
            <div key={i} className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"14px 16px",marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div>
                  <div style={{fontSize:11,fontWeight:500,color:ms.color,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>{ms.tag}</div>
                  <div style={{fontSize:15,fontWeight:500}}>{ms.title}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                  <div style={{fontSize:13,fontWeight:500,color:ms.pct===100?"#16a34a":"#374151"}}>{ms.done}/{ms.total}</div>
                  <div style={{fontSize:11,color:"#9ca3af"}}>tasks</div>
                </div>
              </div>
              <div style={{height:6,borderRadius:99,background:"#e5e7eb",overflow:"hidden",marginTop:8}}>
                <div style={{height:"100%",width:ms.pct+"%",background:ms.color,borderRadius:99,transition:"width 0.4s"}}/>
              </div>
              <div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>{ms.pct}% complete · ~{ms.wks} weeks (~{ms.mos} months) at {paceObj.label} · <span style={{color:ms.color,fontWeight:500}}>{ms.label}</span></div>
            </div>
          ))}
        </>
      )}

      {/* ── PHASE 2 ── */}
      {view==="phase2"&&(
        <>
          {!isP2Available?(
            <div className="unlock-box" style={{background:"#fafaf9",border:"0.5px solid #e7e5e4",borderRadius:12,padding:"24px",textAlign:"center"}}>
              <div style={{fontSize:32,marginBottom:12}}>🔒</div>
              <div style={{fontSize:16,fontWeight:500,marginBottom:8}}>Phase 2 — DevOps role</div>
              <div style={{fontSize:13,color:"#6b7280",marginBottom:20,lineHeight:1.6}}>Phase 2 automatically unlocks when you complete Phase 1 (100%). Already working as a DevSecOps engineer? Unlock Phase 2 manually.</div>
              <div style={{fontSize:13,color:"#6b7280",marginBottom:16}}>Phase 1 progress: <strong style={{color:"#4f46e5"}}>{p1Pct}%</strong> ({p1Done}/{p1Total} tasks)</div>
              <div style={{height:6,borderRadius:99,background:"#e5e7eb",overflow:"hidden",marginBottom:20,maxWidth:300,margin:"0 auto 20px"}}>
                <div style={{height:"100%",width:p1Pct+"%",background:"#4f46e5",borderRadius:99}}/>
              </div>
              <button onClick={()=>unlockP2(true)} style={{background:"#0891b2",color:"#fff",border:"none",borderRadius:10,padding:"11px 24px",fontSize:14,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>
                I'm already a DevSecOps engineer — unlock Phase 2
              </button>
            </div>
          ):(
            <>
              <div style={{background:"#0c4a6e",borderRadius:12,padding:"14px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontSize:10,color:"#7dd3fc",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>Phase 2 · DevOps role · Unlocked ✓</div>
                  <div style={{fontSize:15,fontWeight:500,color:"#fff"}}>Kubernetes · Terraform · Python · AWS · Monitoring · GitOps</div>
                </div>
                <div style={{fontSize:12,color:"#bae6fd"}}>{p2Done}/{p2AllTasks.length} tasks · Lead: {p2LeadDone} verified</div>
              </div>

              {/* Sub-nav: My tasks vs Lead checklist */}
              <div style={{display:"flex",gap:6,marginBottom:16,background:"#f3f4f6",borderRadius:10,padding:4}}>
                {[{id:"mytasks",label:"📋 My tasks"},{id:"lead",label:"✅ Lead checklist"}].map(t=>(
                  <button key={t.id} onClick={()=>setP2View(t.id)}
                    style={{flex:1,background:p2View===t.id?"#fff":"transparent",border:p2View===t.id?"0.5px solid #e5e7eb":"none",borderRadius:8,padding:"8px",fontSize:13,fontWeight:p2View===t.id?500:400,cursor:"pointer",fontFamily:"inherit",color:p2View===t.id?"#111827":"#6b7280"}}>
                    {t.label}
                  </button>
                ))}
              </div>

              {p2View==="mytasks"&&(
                <>
                  <p style={{fontSize:12,color:"#9ca3af",marginBottom:12}}>Check off tasks as you complete them. Your lead can independently verify your work in the Lead checklist tab.</p>
                  {P2_TOPICS.map((topic,ti)=>{
                    const tDone=topic.tasks.filter(t=>checked[t.id]).length;
                    const isOpen=!!expandedP2[topic.id];
                    return(
                      <div key={ti} className="wk-card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,marginBottom:8,overflow:"hidden"}}>
                        <div onClick={()=>setExpandedP2(p=>({...p,[topic.id]:!p[topic.id]}))} style={{padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div style={{width:10,height:10,borderRadius:"50%",background:topic.color,flexShrink:0}}/>
                            <div>
                              <div style={{fontSize:13,fontWeight:500}}>{topic.label}</div>
                              <div style={{fontSize:11,color:"#9ca3af",marginTop:1}}>Phase 2 · DevOps role</div>
                            </div>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:12,color:tDone===topic.tasks.length?"#16a34a":"#9ca3af"}}>{tDone}/{topic.tasks.length}</span>
                            <span style={{fontSize:11,color:"#9ca3af"}}>{isOpen?"▲":"▼"}</span>
                          </div>
                        </div>
                        {isOpen&&topic.tasks.map((task,i)=>(
                          <TaskRow key={i} task={task} isDone={!!checked[task.id]} onToggle={()=>{const n={...checked,[task.id]:!checked[task.id]};saveChecked(n);}}/>
                        ))}
                      </div>
                    );
                  })}
                </>
              )}

              {p2View==="lead"&&(
                <>
                  <div className="lead-row" style={{background:"#f0fdf4",border:"0.5px solid #bbf7d0",borderRadius:10,padding:"12px 14px",marginBottom:14,fontSize:13,color:"#15803d"}}>
                    <strong>Lead / Manager checklist</strong> — This is a separate checklist for your lead to verify completed work. Lead checkboxes are independent from the learner's own progress.
                    <div style={{fontSize:12,marginTop:4,color:"#16a34a"}}>{p2LeadDone} of {p2AllTasks.length} tasks verified so far.</div>
                  </div>
                  {P2_TOPICS.map((topic,ti)=>{
                    const lDone=topic.tasks.filter(t=>leadChecked[t.id]).length;
                    const myDone=topic.tasks.filter(t=>checked[t.id]).length;
                    const isOpen=!!expandedP2["lead_"+topic.id];
                    return(
                      <div key={ti} className="wk-card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,marginBottom:8,overflow:"hidden"}}>
                        <div onClick={()=>setExpandedP2(p=>({...p,["lead_"+topic.id]:!p["lead_"+topic.id]}))} style={{padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div style={{width:10,height:10,borderRadius:"50%",background:topic.color,flexShrink:0}}/>
                            <div>
                              <div style={{fontSize:13,fontWeight:500}}>{topic.label}</div>
                              <div style={{fontSize:11,color:"#9ca3af",marginTop:1}}>Learner: {myDone}/{topic.tasks.length} done · Lead verified: {lDone}/{topic.tasks.length}</div>
                            </div>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:12,color:lDone===topic.tasks.length?"#16a34a":"#9ca3af"}}>{lDone}/{topic.tasks.length} ✓</span>
                            <span style={{fontSize:11,color:"#9ca3af"}}>{isOpen?"▲":"▼"}</span>
                          </div>
                        </div>
                        {isOpen&&topic.tasks.map((task,i)=>{
                          const lDone=!!leadChecked[task.id];
                          const mDone=!!checked[task.id];
                          return(
                            <div key={i} onClick={()=>{const n={...leadChecked,[task.id]:!leadChecked[task.id]};saveLeadChecked(n);}}
                              style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 14px",borderTop:"0.5px solid #f9fafb",cursor:"pointer",background:lDone?"#f0fdf4":"white"}}>
                              <div style={{width:16,height:16,borderRadius:4,border:lDone?"none":"1.5px solid #16a34a",background:lDone?"#16a34a":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
                                {lDone&&<span style={{color:"white",fontSize:10,fontWeight:700}}>✓</span>}
                              </div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{display:"flex",gap:6,marginBottom:2,flexWrap:"wrap"}}>
                                  {mDone&&<span style={{fontSize:9,background:"#dcfce7",color:"#15803d",borderRadius:4,padding:"1px 5px",fontWeight:500}}>learner done</span>}
                                  {!mDone&&<span style={{fontSize:9,background:"#fef9c3",color:"#854d0e",borderRadius:4,padding:"1px 5px",fontWeight:500}}>learner pending</span>}
                                  {task.ai&&<span className="ai-badge" style={{fontSize:9,fontWeight:500,background:"#eef2ff",color:"#4338ca",borderRadius:4,padding:"1px 5px"}}>AI task</span>}
                                </div>
                                {task.url?(
                                  <a href={task.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
                                    style={{fontSize:12,color:"#374151",textDecoration:lDone?"line-through":"none",opacity:lDone?0.5:1,display:"block",wordBreak:"break-word"}}>
                                    {task.label} ↗
                                  </a>
                                ):(
                                  <span style={{fontSize:12,color:"#374151",textDecoration:lDone?"line-through":"none",opacity:lDone?0.5:1,display:"block"}}>{task.label}</span>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </>
              )}
            </>
          )}
        </>
      )}

      {/* ── SETUP ── */}
      {view==="setup"&&(
        <>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:4}}>Study pace</div>
            <p style={{fontSize:13,color:"#6b7280",marginBottom:12}}>Changing pace rebuilds the weekly schedule. Completed checkboxes are preserved.</p>
            <PaceSelector value={pace} onChange={savePace}/>
          </div>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:8}}>Start date</div>
            <input type="date" value={startDate} onChange={e=>saveDate(e.target.value)} style={{width:"100%",fontSize:14,padding:"8px 10px",borderRadius:8,border:"0.5px solid #d1d5db",fontFamily:"inherit"}}/>
            {startDate&&<p style={{fontSize:12,color:"#16a34a",marginTop:8}}>Saved. Nudges are active.</p>}
          </div>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:4}}>Phase 2 access</div>
            <p style={{fontSize:13,color:"#6b7280",marginBottom:12}}>Phase 2 auto-unlocks at 100% Phase 1 completion. You can also manually toggle it here.</p>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button onClick={()=>unlockP2(!p2Unlocked)} style={{background:p2Unlocked?"#0891b2":"transparent",color:p2Unlocked?"#fff":"#6b7280",border:"0.5px solid "+(p2Unlocked?"#0891b2":"#e5e7eb"),borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>
                {p2Unlocked?"Phase 2 manually unlocked ✓":"Unlock Phase 2 manually"}
              </button>
              {p2Unlocked&&<button onClick={()=>unlockP2(false)} style={{fontSize:12,color:"#9ca3af",background:"none",border:"none",cursor:"pointer",textDecoration:"underline",fontFamily:"inherit"}}>lock again</button>}
            </div>
          </div>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:10}}>Google Calendar — weekly study block</div>
            {[`Open Google Calendar → click your preferred study day`,`Title: 'DevSecOps Study Session'`,`Duration: match your ${paceObj.label} pace`,"Repeat: Every week","Notification: 30 minutes before","Add this app's URL in the description","Save"].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:"#eef2ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,color:"#4f46e5",flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:13,lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>
          <div className="card" style={{background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:12,padding:"16px"}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:10}}>Gmail — weekly self-reminder</div>
            {["Compose new email to yourself","Subject: 'DevSecOps — weekly check-in'","Body: What did I complete? What's next? Am I on track?","Click arrow next to Send → Schedule send","Pick next Monday 8am","Reschedule each week — takes 2 minutes"].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:"#f0fdf4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,color:"#16a34a",flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:13,lineHeight:1.5}}>{s}</span>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
